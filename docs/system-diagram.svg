<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 720" width="100%" max-width="860" style="background:#f7f8fa;border-radius:10px" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="#64748b"/>
    </marker>
    <marker id="arrow-rest" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="#2563eb"/>
    </marker>
    <marker id="arrow-ws" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="#0891b2"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">PowerDesk Backend — System Architecture</text>

  <!-- ═══════════════ TIER 1: DEVICES ═══════════════ -->
  <rect x="280" y="60" width="300" height="64" rx="10" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/>
  <text x="430" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Simulated Office Devices</text>
  <text x="430" y="106" text-anchor="middle" font-size="11" fill="#dcfce7">15 devices — 6 fans + 9 lights — across 3 rooms</text>

  <!-- Arrow: Devices → Backend -->
  <line x1="430" y1="124" x2="430" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="442" y="155" font-size="11" fill="#64748b">simulated data</text>

  <!-- ═══════════════ TIER 2: BACKEND ═══════════════ -->
  <rect x="50" y="180" width="760" height="200" rx="12" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
  <text x="430" y="206" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">PowerDesk Backend</text>
  <text x="430" y="224" text-anchor="middle" font-size="12" fill="#94a3b8">Node.js + Express + WebSocket</text>

  <!-- Internal component boxes -->
  <rect x="80" y="242" width="150" height="52" rx="7" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="155" y="263" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">Device Simulator</text>
  <text x="155" y="280" text-anchor="middle" font-size="10" fill="#94a3b8">30–60s tick loop</text>

  <rect x="250" y="242" width="150" height="52" rx="7" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="325" y="263" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">Power Calculator</text>
  <text x="325" y="280" text-anchor="middle" font-size="10" fill="#94a3b8">Wattage aggregation</text>

  <rect x="420" y="242" width="150" height="52" rx="7" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="495" y="263" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">Alert Engine</text>
  <text x="495" y="280" text-anchor="middle" font-size="10" fill="#94a3b8">After-hours + runtime</text>

  <rect x="590" y="242" width="190" height="52" rx="7" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="685" y="260" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">REST API + WebSocket</text>
  <text x="685" y="276" text-anchor="middle" font-size="10" fill="#94a3b8">Port :5000 &amp; Port :8080</text>

  <!-- CORS bar -->
  <rect x="80" y="310" width="700" height="28" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="430" y="329" text-anchor="middle" font-size="11" fill="#94a3b8">CORS enabled for cross-origin consumers</text>

  <!-- Internal data flow arrows -->
  <line x1="230" y1="268" x2="250" y2="268" stroke="#475569" stroke-width="1.5"/>
  <line x1="400" y1="268" x2="420" y2="268" stroke="#475569" stroke-width="1.5"/>
  <line x1="570" y1="268" x2="590" y2="268" stroke="#475569" stroke-width="1.5"/>

  <!-- WebSocket interval note -->
  <text x="430" y="358" text-anchor="middle" font-size="11" fill="#64748b">WebSocket broadcasts: device-update (on tick)  |  alert-triggered (on alert)  |  power-update (every 5s)</text>

  <!-- Arrow: Backend → Dashboard (REST) -->
  <line x1="240" y1="380" x2="240" y2="450" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-rest)"/>
  <text x="200" y="420" font-size="11" font-weight="600" fill="#2563eb">REST</text>

  <!-- Arrow: Backend → Dashboard (WS) -->
  <line x1="290" y1="380" x2="290" y2="450" stroke="#0891b2" stroke-width="2" marker-end="url(#arrow-ws)"/>
  <text x="260" y="420" font-size="11" font-weight="600" fill="#0891b2">WS</text>

  <!-- Arrow: Backend → Bot (REST) -->
  <line x1="570" y1="380" x2="570" y2="450" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-rest)"/>
  <text x="585" y="420" font-size="11" font-weight="600" fill="#2563eb">REST</text>

  <!-- Arrow: Backend → Bot (WS) -->
  <line x1="620" y1="380" x2="620" y2="450" stroke="#0891b2" stroke-width="2" marker-end="url(#arrow-ws)"/>
  <text x="635" y="420" font-size="11" font-weight="600" fill="#0891b2">WS</text>

  <!-- ═══════════════ TIER 3: CONSUMERS ═══════════════ -->
  <!-- Dashboard -->
  <rect x="165" y="450" width="260" height="74" rx="10" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="295" y="478" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">React Dashboard</text>
  <text x="295" y="498" text-anchor="middle" font-size="11" fill="#bfdbfe">Live device state · Power meters · Alerts</text>

  <!-- Discord Bot -->
  <rect x="435" y="450" width="260" height="74" rx="10" fill="#5865F2" stroke="#454FBF" stroke-width="1.5"/>
  <text x="565" y="478" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Discord Bot</text>
  <text x="565" y="498" text-anchor="middle" font-size="11" fill="#d5d8f5">!status · !room · !usage · Notifications</text>

  <!-- Arrow: Dashboard → User -->
  <line x1="295" y1="524" x2="295" y2="590" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow: Bot → User -->
  <line x1="565" y1="524" x2="565" y2="590" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ═══════════════ TIER 4: USER ═══════════════ -->
  <rect x="305" y="590" width="250" height="56" rx="28" fill="#475569" stroke="#334155" stroke-width="1.5"/>
  <text x="430" y="616" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">End User</text>
  <text x="430" y="634" text-anchor="middle" font-size="11" fill="#cbd5e0">Browser + Discord Client</text>

  <!-- ═══════════════ LEGEND ═══════════════ -->
  <rect x="30" y="668" width="800" height="36" rx="8" fill="#e2e8f0" stroke="#cbd5e0" stroke-width="1"/>
  <text x="50" y="691" font-size="11" font-weight="600" fill="#475569">Legend:</text>
  <rect x="110" y="682" width="12" height="12" rx="2" fill="#16a34a"/><text x="128" y="692" font-size="11" fill="#475569">Device simulation</text>
  <rect x="270" y="682" width="12" height="12" rx="2" fill="#1e293b"/><text x="288" y="692" font-size="11" fill="#475569">Backend services</text>
  <rect x="410" y="682" width="12" height="12" rx="2" fill="#2563eb"/><text x="428" y="692" font-size="11" fill="#475569">REST data flow</text>
  <rect x="540" y="682" width="12" height="12" rx="2" fill="#0891b2"/><text x="558" y="692" font-size="11" fill="#475569">WebSocket data flow</text>
  <rect x="690" y="682" width="12" height="12" rx="2" fill="#475569"/><text x="708" y="692" font-size="11" fill="#475569">User interaction</text>
</svg>
