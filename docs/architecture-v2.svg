<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620" width="100%" style="background:#f7f8fa;border-radius:10px" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="#2563eb"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="#0891b2"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">PowerDesk — Layered Architecture</text>

  <!-- Tier 1: Consumers -->
  <rect x="120" y="60" width="250" height="74" rx="10" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="245" y="88" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">React Dashboard</text>
  <text x="245" y="108" text-anchor="middle" font-size="11" fill="#bfdbfe">Vite + React 19 + TypeScript</text>
  <text x="245" y="122" text-anchor="middle" font-size="10" fill="#bfdbfe">Real-time state · Power meters · Floor plan</text>

  <rect x="490" y="60" width="250" height="74" rx="10" fill="#5865F2" stroke="#454FBF" stroke-width="1.5"/>
  <text x="615" y="88" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Discord Bot</text>
  <text x="615" y="108" text-anchor="middle" font-size="11" fill="#d5d8f5">discord.js v14 + TypeScript</text>
  <text x="615" y="122" text-anchor="middle" font-size="10" fill="#d5d8f5">/status · /room · /usage · Alerts</text>

  <!-- Arrows: Consumers → Backend -->
  <line x1="245" y1="134" x2="245" y2="180" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="200" y="160" font-size="11" font-weight="600" fill="#2563eb">REST</text>

  <line x1="295" y1="134" x2="295" y2="180" stroke="#0891b2" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  <text x="265" y="160" font-size="11" font-weight="600" fill="#0891b2">WS</text>

  <line x1="615" y1="134" x2="615" y2="180" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="575" y="160" font-size="11" font-weight="600" fill="#2563eb">REST</text>

  <line x1="665" y1="134" x2="665" y2="180" stroke="#0891b2" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  <text x="635" y="160" font-size="11" font-weight="600" fill="#0891b2">WS</text>

  <!-- Tier 2: Backend -->
  <rect x="50" y="180" width="760" height="180" rx="12" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
  <text x="430" y="206" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">PowerDesk Backend</text>
  <text x="430" y="224" text-anchor="middle" font-size="12" fill="#94a3b8">Node.js + Express 5 + WebSocket (ws) — Port 5000</text>

  <!-- Internal: Simulator -->
  <rect x="80" y="240" width="150" height="52" rx="7" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="155" y="261" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">Device Simulator</text>
  <text x="155" y="278" text-anchor="middle" font-size="10" fill="#94a3b8">15 devices, 30–60s ticks</text>

  <!-- Internal: Power Calculator -->
  <rect x="250" y="240" width="150" height="52" rx="7" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="325" y="261" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">Power Calculator</text>
  <text x="325" y="278" text-anchor="middle" font-size="10" fill="#94a3b8">Wattage aggregation</text>

  <!-- Internal: Alert Engine -->
  <rect x="420" y="240" width="150" height="52" rx="7" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="495" y="261" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">Alert Engine</text>
  <text x="495" y="278" text-anchor="middle" font-size="10" fill="#94a3b8">After-hours + runtime</text>

  <!-- Internal: API Layer -->
  <rect x="590" y="240" width="190" height="52" rx="7" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="685" y="261" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e8f0">REST API + WebSocket</text>
  <text x="685" y="278" text-anchor="middle" font-size="10" fill="#94a3b8">6 endpoints · 3 event types</text>

  <!-- Internal flow arrows -->
  <line x1="230" y1="266" x2="250" y2="266" stroke="#475569" stroke-width="1.5"/>
  <line x1="400" y1="266" x2="420" y2="266" stroke="#475569" stroke-width="1.5"/>
  <line x1="570" y1="266" x2="590" y2="266" stroke="#475569" stroke-width="1.5"/>

  <!-- CORS bar -->
  <rect x="80" y="310" width="700" height="28" rx="6" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="430" y="329" text-anchor="middle" font-size="11" fill="#94a3b8">CORS enabled for cross-origin consumers</text>

  <!-- WebSocket broadcast note -->
  <text x="430" y="368" text-anchor="middle" font-size="11" fill="#64748b">WS broadcasts: device-update (on tick) · alert-triggered (on alert) · power-update (every 5s)</text>

  <!-- Tier 3: Data Source -->
  <line x1="430" y1="380" x2="430" y2="420" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="442" y="405" font-size="11" fill="#64748b">simulated data</text>

  <rect x="230" y="420" width="400" height="64" rx="10" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/>
  <text x="430" y="446" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Simulated Office Devices</text>
  <text x="430" y="466" text-anchor="middle" font-size="11" fill="#dcfce7">15 devices — 6 fans + 9 lights — across 3 rooms</text>

  <!-- Legend -->
  <rect x="30" y="510" width="800" height="36" rx="8" fill="#e2e8f0" stroke="#cbd5e0" stroke-width="1"/>
  <text x="50" y="533" font-size="11" font-weight="600" fill="#475569">Legend:</text>
  <rect x="110" y="524" width="12" height="12" rx="2" fill="#2563eb"/><text x="128" y="534" font-size="11" fill="#475569">REST data flow</text>
  <rect x="240" y="524" width="12" height="12" rx="2" fill="#0891b2"/><text x="258" y="534" font-size="11" fill="#475569">WebSocket data flow</text>
  <rect x="400" y="524" width="12" height="12" rx="2" fill="#1e293b"/><text x="418" y="534" font-size="11" fill="#475569">Backend services</text>
  <rect x="550" y="524" width="12" height="12" rx="2" fill="#16a34a"/><text x="568" y="534" font-size="11" fill="#475569">Data source</text>
  <rect x="680" y="524" width="12" height="12" rx="2" fill="#64748b"/><text x="698" y="534" font-size="11" fill="#475569">Internal flow</text>
</svg>
